<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap Icons CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    
    <link rel="stylesheet" href="Calculator.css">
</head>
<body>
    <div class="container d-flex flex-column align-items-center justify-content-center border rounded p-5 mt-5" style="background-color: #1b1d23; width: 400px; height: 600px;">
        <div class="container border rounded p-2" style="background-color: #24262e; width: 100%; height: 100%;">
            <div class="header">
            <h1 class="text-white" style="text-align: center; font-size: 40px; padding-top: 15px;">Calculator</h1>
        </div>

        

    <!--Designing the Calculator's body-->
    <!--View Port-->
        <div class="viewport">
            <p id="display" class="form-control text-right p-3" style="text-align: right; margin: 0;">0</p>
            <div class="history-box border border-secondary rounded p-1 mb-2" style="background-color: #2c2f38; width: 100%; height: 50px; overflow-y: auto;">
                <ul id="history-list">
                    <!-- New calculations will appear here dynamically -->
                </ul>
            </div>
        </div>
        <div id="Cal_buttons" class="buttons d-flex flex-column align-items-center justify-content-center">
            <div class="row g-2 mb-2">
                <div class="col-3"><button id="clear" class="btn btn-danger mx-2">AC</button></div>
                <div class="col-3"><button id="percentButton" class="btn btn-secondary mx-2">%</button></div>
                <div class="col-3"><button id="delete" class="btn btn-secondary mx-1 btn btn-warning text-dark">DEL</button></div>
                <div class="col-3"><button class="op-button btn btn-secondary mx-2 py-2 px-3">/</button></div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">7</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">8</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">9</button></div>
                <div class="col-3"><button class="op-button btn btn-secondary m-2 py-2 px-3">+</button></div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">4</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">5</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">6</button></div>
                <div class="col-3"><button class="op-button btn btn-secondary m-2 py-2 px-3">-</button></div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">1</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">2</button></div>
                <div class="col-3"><button class="num-button m-2 py-2 px-3 border-1 rounded">3</button></div>
                <div class="col-3"><button class="op-button btn btn-secondary m-2 py-2 px-3">*</button></div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3"><button class="num-button m-2 px-3 py-2 border-1 rounded">0</button></div>
                <div class="col-3"><button id="decimal" class="btn btn-secondary px-3 py-2 m-2">.</button></div>
                <div class="col-3"><button id="equals" class="btn btn-success px-5 py-2 m-2">=</button></div>
            </div>
        </div>
        </div>
        
    </div>
    <script src="Calculator.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
